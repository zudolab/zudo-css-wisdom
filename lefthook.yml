pre-commit:
  parallel: true
  commands:
    format-mdx:
      glob: "*.{md,mdx}"
      run: pnpm dlx @takazudo/mdx-formatter --write {staged_files} && git add {staged_files}
    format-astro:
      glob: "*.astro"
      run: pnpm exec prettier --write {staged_files} && git add {staged_files}

pre-push:
  commands:
    check-main:
      run: |
        current_branch=$(git symbolic-ref --short HEAD 2>/dev/null)
        if [ "$current_branch" = "main" ]; then
          echo "Running quality checks before pushing to main..."
          pnpm check
        fi
