# Preview deployment workflow for branch-based previews.
#
# Triggered on pushes to `preview` or `expreview/*` branches.
# Builds the site, deploys to Cloudflare Pages, and sets a commit status.

name: Preview Deploy

on:
  push:
    branches:
      - preview
      - 'expreview/*'

concurrency:
  group: preview-deploy-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  # ─── Build and Deploy ─────────────────────────────────────────────────

  build-and-deploy:
    name: Build and Deploy Preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Determine branch name
        id: branch
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          DEPLOY_BRANCH=$(echo "$BRANCH" | sed 's|/|-|g')
          echo "name=$DEPLOY_BRANCH" >> "$GITHUB_OUTPUT"
      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/pj/zcss
          cp -r dist/. deploy/pj/zcss/
          echo '/ /pj/zcss/ 302' > deploy/_redirects
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          npx wrangler@4 pages deploy deploy \
            --project-name=zudo-css \
            --branch="$DEPLOY_BRANCH" \
            --commit-hash="${GITHUB_SHA}" \
            --commit-message="Preview: ${DEPLOY_BRANCH} @ ${GITHUB_SHA::7}"

          echo "Preview URL: https://${DEPLOY_BRANCH}.zudo-css.pages.dev/pj/zcss/"
      - name: Set commit status
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const branch = '${{ steps.branch.outputs.name }}';
            const success = '${{ job.status }}' === 'success';
            const previewUrl = `https://${branch}.zudo-css.pages.dev/pj/zcss/`;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              target_url: success
                ? previewUrl
                : `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: success ? 'Preview deployed' : 'Preview deploy failed',
              context: 'cloudflare/preview',
            });
