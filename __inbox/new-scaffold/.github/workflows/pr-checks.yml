name: PR Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ─── Type Check ───────────────────────────────────────────────────────

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run type checking
        run: pnpm check

  # ─── Build + Link Check + Preview Deploy ──────────────────────────────
  #
  # Build, link check, and preview deploy run in a single job so the build
  # output stays on the runner filesystem -- no artifacts, no cache transfers,
  # no storage usage. Link check runs before preview deploy so broken links
  # prevent a preview from being published.

  build-preview:
    name: Build, Link Check, and Preview Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build site
        run: pnpm build
      - name: Check links
        run: node scripts/check-links.js
      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/pj/zcss
          cp -r dist/. deploy/pj/zcss/
          echo '/ /pj/zcss/ 302' > deploy/_redirects
      - name: Deploy preview to Cloudflare Pages
        id: cf-deploy
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          npx wrangler@4 pages deploy deploy \
            --project-name=zudo-css \
            --branch="pr-${PR_NUMBER}" \
            --commit-hash="${GITHUB_SHA}" \
            --commit-message="Preview: PR #${PR_NUMBER}"
          DEPLOY_URL="https://pr-${PR_NUMBER}.zudo-css.pages.dev"
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $DEPLOY_URL"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Comment preview URL on PR
        uses: actions/github-script@v8
        env:
          DEPLOY_URL: ${{ steps.cf-deploy.outputs.deploy_url }}
        with:
          script: |
            const deployUrl = process.env.DEPLOY_URL;
            const prNumber = context.issue.number;
            const marker = '<!-- cf-preview-pr -->';

            const body = [
              marker,
              `## Cloudflare Pages Preview`,
              '',
              `Preview deployment is ready.`,
              '',
              `| | URL |`,
              `|---|---|`,
              `| Preview | ${deployUrl} |`,
              '',
              `Built from commit: \`${context.sha.substring(0, 7)}\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated existing preview comment (id: ${existing.id})`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              console.log('Created new preview comment');
            }
