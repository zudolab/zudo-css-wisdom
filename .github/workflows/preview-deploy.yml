name: Preview Deploy

on:
  push:
    branches:
      - preview
      - 'expreview/*'

concurrency:
  group: preview-deploy-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  detect-runner:
    uses: ./.github/workflows/detect-runner.yml
    secrets: inherit

  build-and-deploy:
    name: Build and Deploy Preview
    needs: detect-runner
    runs-on: ${{ needs.detect-runner.outputs.runner }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Determine branch name
        id: branch
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          DEPLOY_BRANCH=$(echo "$BRANCH" | sed 's|/|-|g')
          echo "name=$DEPLOY_BRANCH" >> "$GITHUB_OUTPUT"
      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/pj/zcss
          cp -r dist/* deploy/pj/zcss/
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          pnpm dlx wrangler pages deploy deploy \
            --project-name=zudo-css \
            --branch="$DEPLOY_BRANCH" \
            --commit-hash=${GITHUB_SHA} \
            --commit-message="Preview: ${DEPLOY_BRANCH} @ ${GITHUB_SHA::7}"

          echo "Preview URL: https://${DEPLOY_BRANCH}.zudo-css.pages.dev/pj/zcss/"
      - name: Set commit status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.branch.outputs.name }}';
            const success = '${{ job.status }}' === 'success';
            const previewUrl = `https://${branch}.zudo-css.pages.dev/pj/zcss/`;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              target_url: success
                ? previewUrl
                : `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: success ? 'Preview deployed' : 'Preview deploy failed',
              context: 'cloudflare/preview',
            });
